# SwiftLint — strict, enterprise-grade ruleset for gbar.
# Run: swiftlint lint --strict   (CI uses --strict; dev hook uses lint --fix)

disabled_rules:
  - trailing_whitespace    # swiftformat handles
  - todo                   # custom todo_format rule below
  - trailing_comma         # swiftformat --commas always handles correctly
  - opening_brace          # conflicts with swiftformat --enable wrapMultilineStatementBraces
                           # (brace on its own line after a multi-line condition); swiftformat owns it

# Opt-in rules — the curated "enterprise" pack
opt_in_rules:
  # Style & idiom
  - array_init
  # `attributes` is intentionally NOT enabled — attribute placement is delegated
  # to SwiftFormat's wrapAttributes (funcattributes/typeattributes/varattributes/
  # complexattributes), enforced by `swiftformat --lint` in `just check`. SwiftLint's
  # rule conflicts irreconcilably with SwiftFormat on property-wrapper vars with
  # initializers (e.g. `@ScaledMetric var x = 28`) and multi-attribute computed
  # properties — same delegation rationale as trailing_whitespace/trailing_comma above.
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_fallthrough_only
  - no_space_in_method_call
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_optional_binding
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - test_case_accessibility
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

  # Performance / correctness
  - prefer_key_path
  - reduce_boolean

  # Safety
  - force_cast
  - force_try
  - implicitly_unwrapped_optional
  - prohibited_interface_builder

analyzer_rules:
  - unused_declaration
  - unused_import

excluded:
  - DerivedData
  - Derived
  - .build
  - Tuist/.build
  - build
  - "gbarTests"      # tests need force_try, etc.
  - "gbarUITests"
  - Tuist/Package.swift           # SPM manifest
  - Project.swift                 # Tuist manifest — declarative target/settings tables, not app source
  - "**/*.generated.swift"

# Limits — enterprise-grade strictness
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1500
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 40
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 25
  ignores_case_statements: true

function_parameter_count:
  warning: 5
  error: 8

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - r
    - g
    - b
    - a
    - x
    - y
    - i
    - j
    - k
    - id
    - db
    - to
    - by
    - on
    - up
    - vc

nesting:
  type_level:
    warning: 2
    error: 3
  function_level:
    warning: 3
    error: 5

large_tuple:
  warning: 3
  error: 4

# Custom rules
custom_rules:
  no_print:
    name: "no print"
    regex: '(?:^|\s)print\('
    message: "Use os.Logger (Log.category.debug/info/error) instead of print()"
    severity: warning
    match_kinds:
      - identifier

  no_force_try:
    name: "no force try"
    regex: 'try!'
    message: "Force try forbidden — use do/catch or throws"
    severity: error

  todo_format:
    name: "todo format"
    regex: 'TODO(?!\(#\d+\))'
    message: "TODOs must reference an issue: TODO(#123)"
    severity: warning

reporter: "xcode"
