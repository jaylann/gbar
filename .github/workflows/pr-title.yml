name: PR Title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    # Dependabot PR titles are already conventional; skip to avoid noise.
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            style
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[a-z].*$
          subjectPatternError: |
            The PR title subject must start lowercase: "{subject}".
