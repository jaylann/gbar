name: release

# Release flow:
#   1. Do your work on `stage`.
#   2. Promote `stage` → `main` via a PR (that's the "release the stage branch" action).
#   3. This workflow runs on push to `main`: it reads marketingVersion/buildNumber from
#      Project.swift and, if tag v<version> doesn't exist yet, creates the tag + GitHub
#      release, then builds a .dmg and uploads it to that release. Finally it fast-forwards
#      `stage` from `main`.
#
# Bump `marketingVersion` in Project.swift before promoting to cut a new release.
# You can also trigger a build manually with "Run workflow".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
    # The stage ruleset requires green checks on pushes, which the sync merge commit can't
    # have. The lanfermann-release-bot app is a ruleset bypass actor, so the sync pushes
    # with its token. Gated on the key existing → a self-host fork (no ruleset, no secret)
    # still syncs fine with GITHUB_TOKEN.
    env:
      HAS_BOT: ${{ secrets.RP_APP_KEY != '' }}
    outputs:
      created: ${{ steps.check.outputs.exists == 'false' }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      # persist-credentials: false — checkout v6+ persists GITHUB_TOKEN in a config file
      # under $RUNNER_TEMP wired in via include.path, which `git config --unset-all` in the
      # repo can't remove; a `-c` extraheader on top then sends TWO Authorization headers →
      # "Duplicate header" → HTTP 400 (broke the stage sync in v0.2.2/v0.2.4). So persist
      # nothing and authenticate each push explicitly with a -c extraheader.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from Project.swift
        id: version
        run: |
          VERSION=$(grep -oE 'marketingVersion = "[^"]+"' Project.swift | head -1 | sed 's/.*"\(.*\)"/\1/')
          BUILD=$(grep -oE 'buildNumber = "[^"]+"' Project.swift | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ -z "$VERSION" ]]; then echo "::error::no marketingVersion in Project.swift"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check whether tag exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag ${{ steps.version.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag + release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name "gbar release bot"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }} (build ${{ steps.version.outputs.build }})"
          # checkout runs with persist-credentials: false (see above), so pushes authenticate
          # explicitly via a -c extraheader.
          AUTH=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')
          git -c http."https://github.com/".extraheader="Authorization: Basic ${AUTH}" \
            push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --target main \
            --generate-notes

      - name: Mint release-bot token
        if: steps.check.outputs.exists == 'false' && env.HAS_BOT == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RP_APP_ID }}
          private-key: ${{ secrets.RP_APP_KEY }}

      # Back-merge main → stage so stage keeps the release's version bump. Best-effort: a
      # sync failure must never fail the release (the DMG is the artifact that matters), so
      # this is continue-on-error and lives after the tag/release are already created.
      - name: Sync stage to main
        if: steps.check.outputs.exists == 'false'
        continue-on-error: true
        env:
          PUSH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin stage
          git checkout stage
          git merge origin/main --no-edit
          # The push must authenticate as the release bot (a ruleset bypass actor) or the stage
          # ruleset rejects it with GH013 (required checks + PR-only). checkout persists no
          # credentials (persist-credentials: false above — its $RUNNER_TEMP-include header
          # can't be unset from the repo and duplicates any -c header → HTTP 400), so the -c
          # extraheader below is the ONLY Authorization header and the bot identity applies.
          AUTH=$(printf 'x-access-token:%s' "$PUSH_TOKEN" | base64 | tr -d '\n')
          git -c http."https://github.com/".extraheader="Authorization: Basic ${AUTH}" \
            push origin HEAD:stage

  dmg:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    # macos-26 ships Xcode 26, whose actool compiles the Icon Composer `.icon` bundle
    # (gbar/Resources/gbar.icon) into a real app icon. On macos-15 (Xcode 16.4) actool
    # doesn't understand `.icon` and copies it as a raw resource, so the app shipped
    # without an icon. Keep this on the newest image so the icon (and DMG volume icon) build.
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
    # Secrets can't be used in `if:` directly, so surface presence as job-level booleans.
    # Each signing/notary/cask step is gated on these so a self-host fork with no secrets
    # still produces a working (ad-hoc, un-notarized) DMG instead of failing the job.
    env:
      # Signing needs cert + team + a Developer ID provisioning profile: on macOS the profile
      # must validate the sandbox's application-identifier/keychain-access-groups entitlements,
      # or the built app won't launch ("Launchd job spawn failed"). All three or ad-hoc.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.GBAR_DEVELOPMENT_TEAM_RELEASE != '' && secrets.GBAR_PROVISIONING_PROFILE != '' }}
      # Notarization requires a Developer-ID-signed app, so it also depends on the signing
      # cert — otherwise a partial-secrets config would submit an ad-hoc DMG that Apple rejects.
      HAS_NOTARY: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.NOTARY_APPLE_ID != '' && secrets.NOTARY_PASSWORD != '' && secrets.GBAR_DEVELOPMENT_TEAM_RELEASE != '' && secrets.GBAR_PROVISIONING_PROFILE != '' }}
      # Cask push authenticates as the release bot (GitHub App installed on jaylann/homebrew-tap).
      HAS_TAP: ${{ secrets.RP_APP_KEY != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install tools
        run: brew install tuist just

      # Import the Developer ID Application cert into a throwaway keychain so codesign
      # (invoked by xcodebuild during make-dmg.sh) can sign with it non-interactively.
      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/gbar-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/gbar-cert.p12"
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null
          # Put our keychain first in the search list so xcodebuild finds the identity.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$CERT_PATH"

      # Install the Developer ID provisioning profile for dev.lanfermann.gbar. It validates
      # the application-identifier + keychain-access-groups entitlements at build time — on
      # macOS a sandboxed app with an unvalidated keychain group is refused by launchd
      # ("Launchd job spawn failed"), which is exactly what broke the v0.2.2 DMG (re-signed
      # with the group but no profile). With the profile installed, Xcode happily builds the
      # keychain group under Manual signing and the re-sign hack is unnecessary.
      - name: Install provisioning profile
        if: env.HAS_SIGNING == 'true'
        env:
          GBAR_PROVISIONING_PROFILE: ${{ secrets.GBAR_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$GBAR_PROVISIONING_PROFILE" | base64 --decode \
            -o "$PROFILE_DIR/gbar-developer-id.provisionprofile"

      # Pre-write Release.xcconfig with Developer ID + hardened-runtime values. make-dmg.sh
      # runs `just _xcconfig`, which only BACKFILLS missing keys, so this file is respected.
      # This is also where the paid build's baked GH OAuth client ID is materialized (#4).
      #
      # Signing notes:
      #  - GBAR_ENTITLEMENTS = gbar-signed.entitlements: App Sandbox + $(AppIdentifierPrefix)
      #    keychain-access-group — same file the team dev build uses. Valid at build time here
      #    because the installed Developer ID provisioning profile
      #    (GBAR_PROVISIONING_PROFILE_SPECIFIER) authorizes it; see the install step above.
      #  - CODE_SIGN_INJECT_BASE_ENTITLEMENTS = NO: `xcodebuild build` with Manual signing
      #    injects com.apple.security.get-task-allow, which notarization rejects.
      # Body must be valid xcconfig (KEY = VALUE / `//` comments only) — no `#` lines.
      - name: Write signed Release.xcconfig
        if: env.HAS_SIGNING == 'true'
        env:
          GH_OAUTH_CLIENT_ID_RELEASE: ${{ secrets.GH_OAUTH_CLIENT_ID_RELEASE }}
          GBAR_DEVELOPMENT_TEAM_RELEASE: ${{ secrets.GBAR_DEVELOPMENT_TEAM_RELEASE }}
          GBAR_PROVISIONING_PROFILE_NAME: ${{ secrets.GBAR_PROVISIONING_PROFILE_NAME }}
        run: |
          mkdir -p Tuist/Config
          cat > Tuist/Config/Release.xcconfig <<EOF
          GH_OAUTH_CLIENT_ID = ${GH_OAUTH_CLIENT_ID_RELEASE:-}
          GH_API_BASE_URL = https:/\$()/api.github.com
          GBAR_CODE_SIGN_STYLE = Manual
          GBAR_CODE_SIGN_IDENTITY = Developer ID Application
          GBAR_DEVELOPMENT_TEAM = ${GBAR_DEVELOPMENT_TEAM_RELEASE}
          GBAR_ENTITLEMENTS = gbar/gbar-signed.entitlements
          GBAR_PROVISIONING_PROFILE_SPECIFIER = ${GBAR_PROVISIONING_PROFILE_NAME:-gbar Developer ID}
          ENABLE_HARDENED_RUNTIME = YES
          OTHER_CODE_SIGN_FLAGS = --timestamp
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS = NO
          EOF

      - name: Build DMG
        id: build
        run: |
          DMG=$(./scripts/make-dmg.sh dist)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"

      # Sign the DMG itself with Developer ID (make-dmg.sh signs the app, not the container).
      # A signed + notarized + stapled DMG passes `spctl -t open` offline, not just the app.
      # Verified locally (2026-07-02): spctl → "accepted, source=Notarized Developer ID".
      - name: Sign DMG
        if: env.HAS_SIGNING == 'true'
        run: |
          codesign --force --timestamp \
            --sign "Developer ID Application" "${{ steps.build.outputs.path }}"

      # Notarize the DMG (contains a Developer-ID-signed, hardened-runtime app), then staple
      # the ticket so Gatekeeper accepts it offline. Skipped on self-host forks (no secrets).
      - name: Notarize DMG
        if: env.HAS_NOTARY == 'true'
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          GBAR_DEVELOPMENT_TEAM_RELEASE: ${{ secrets.GBAR_DEVELOPMENT_TEAM_RELEASE }}
        run: |
          xcrun notarytool submit "${{ steps.build.outputs.path }}" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$GBAR_DEVELOPMENT_TEAM_RELEASE" \
            --wait

      - name: Staple notarization ticket
        if: env.HAS_NOTARY == 'true'
        run: |
          xcrun stapler staple "${{ steps.build.outputs.path }}"
          xcrun stapler validate "${{ steps.build.outputs.path }}"

      # Upload the versioned DMG plus a stable-named copy, so
      # releases/latest/download/gbar.dmg is a permanent direct-download URL
      # (the landing page's Download button points at it).
      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "${{ steps.build.outputs.path }}" gbar.dmg
          gh release upload "${{ needs.tag.outputs.tag }}" \
            "${{ steps.build.outputs.path }}" gbar.dmg --clobber

      # Regenerate the Homebrew cask in jaylann/homebrew-tap so `brew install --cask
      # jaylann/tap/gbar` picks up the new version. Pushes as the lanfermann-release-bot
      # GitHub App (must be installed on jaylann/homebrew-tap with Contents: read/write);
      # skipped on forks without the app key.
      - name: Mint tap token
        if: env.HAS_TAP == 'true'
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RP_APP_ID }}
          private-key: ${{ secrets.RP_APP_KEY }}
          owner: jaylann
          repositories: homebrew-tap

      - name: Update Homebrew cask
        if: env.HAS_TAP == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token }}
          VERSION: ${{ needs.tag.outputs.version }}
          DMG_PATH: ${{ steps.build.outputs.path }}
        run: |
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jaylann/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/gbar.rb <<EOF
          cask "gbar" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/jaylann/gbar/releases/download/v#{version}/gbar-#{version}.dmg"
            name "gbar"
            desc "General GitHub companion in your macOS menu bar"
            homepage "https://github.com/jaylann/gbar"

            app "gbar.app"
          end
          EOF
          cd tap
          git config user.email "release-bot@users.noreply.github.com"
          git config user.name "gbar release bot"
          git add Casks/gbar.rb
          git diff --cached --quiet && { echo "no cask change"; exit 0; }
          git commit -m "gbar ${VERSION}"
          git push
