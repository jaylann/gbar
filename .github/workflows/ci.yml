name: ci

# CI gate for gbar: lint (`just check` = SwiftFormat + SwiftLint + typos) → build (compile
# the macOS app). The unit-test suite runs locally (`just test`) — hosted macOS runners are
# slow and menu-bar UI tests are flaky — but CI still *compiles* the app so a broken build
# never merges. Ad-hoc signing (CODE_SIGN_IDENTITY = -) needs no secrets on CI.

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: brew install swiftformat swiftlint tuist just typos-cli
      - name: Generate project
        run: just gen
      - name: Lint checks
        run: just check

  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Install tools
        run: brew install tuist just
      - name: Generate project
        run: just gen
      - name: Build (Debug, macOS)
        run: just build
