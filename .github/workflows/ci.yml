name: ci

# CI gate for gbar: lint (`just check` = SwiftFormat + SwiftLint + typos) → build (compile
# the macOS app + launch smoke test) → test (the deterministic unit suite). The build and
# test jobs run in parallel on separate runners, so a red test next to a green build points
# straight at "logic broke" vs "won't compile". The `gbarTests/` suite is pure unit tests
# over fakes (FakeGitHubAPI + MockURLProtocol) — no XCUIApplication, nothing flaky. Ad-hoc
# signing (CODE_SIGN_IDENTITY = -) needs no secrets on CI, and the public repo gets free
# macOS-runner minutes.
#
# tuist + typos install via mise so CI runs the exact versions pinned in .mise.toml
# (mise-action caches them). swiftformat/swiftlint/just come from Homebrew.

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: tuist typos
      - name: Install lint tools
        run: brew install swiftformat swiftlint just
      - name: Generate project
        run: just gen
      - name: Lint checks
        run: just check

  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: tuist
      - name: Install tools
        run: brew install just
      # Cache the resolved SwiftPM checkouts + Tuist cache so every run doesn't re-fetch/re-resolve
      # dependencies. Keyed on the manifests, so a dependency change invalidates it cleanly.
      - name: Cache SPM & Tuist
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Derived/SourcePackages
            ~/Library/Caches/tuist
          key: ${{ runner.os }}-spm-${{ hashFiles('Project.swift', 'Tuist/**') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Generate project
        run: just gen
      - name: Build (Debug, macOS)
        run: just build
      - name: Launch smoke test
        run: ./scripts/smoke-test.sh

  test:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: tuist
      - name: Install tools
        run: brew install just
      - name: Cache SPM & Tuist
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Derived/SourcePackages
            ~/Library/Caches/tuist
          key: ${{ runner.os }}-spm-${{ hashFiles('Project.swift', 'Tuist/**') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Generate project
        run: just gen
      - name: Test (macOS)
        run: just test
