name: ci

# CI gate for gbar: lint (`just check` = SwiftFormat + SwiftLint + typos) → build (compile
# the macOS app) → test (the deterministic unit suite). The build and test jobs run in
# parallel on separate runners, so a red test next to a green build points straight at
# "logic broke" vs "won't compile". The `gbarTests/` suite is pure unit tests over fakes
# (FakeGitHubAPI + MockURLProtocol) — no XCUIApplication, nothing flaky. Ad-hoc signing
# (CODE_SIGN_IDENTITY = -) needs no secrets on CI, and the public repo gets free
# macOS-runner minutes.

on:
  pull_request:
    branches: [main, stage]
  push:
    branches: [main, stage]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: macos-15
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - name: Install tools
        run: brew install swiftformat swiftlint tuist just typos-cli
      - name: Generate project
        run: just gen
      - name: Lint checks
        run: just check

  build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Install tools
        run: brew install tuist just
      - name: Generate project
        run: just gen
      - name: Build (Debug, macOS)
        run: just build

  test:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true
      - name: Install tools
        run: brew install tuist just
      - name: Generate project
        run: just gen
      - name: Test (macOS)
        run: just test
